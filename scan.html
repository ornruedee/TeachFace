<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สแกนลงเวลา — SPK</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="js/api-config.js"></script>
<!--
  ★ ใช้เฉพาะ face-api.min.js — เล็กกว่า
  ★ Model ที่ใช้: TinyFaceDetector (190KB) + FaceLandmark68TinyNet (80KB) + FaceRecognitionNet (6MB)
    เทียบกับเดิม: SsdMobilenetv1 (5.4MB) + FaceLandmark68Net (350KB) + FaceRecognitionNet (6MB)
    ผลลัพธ์: โหลดเร็วขึ้น + detect เร็วขึ้น 5-10x
-->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
<style>
:root{
  --g:#10b981;--g2:#059669;--r:#ef4444;
  --glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.1);
  --text:#e8edf5;--muted:#7a90b0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Kanit',sans-serif;min-height:100vh;
  background:radial-gradient(ellipse at 20% 80%,#0d2e1f,#0b1e3d 45%,#060e1e 100%);
  color:var(--text);display:flex;flex-direction:column;align-items:center;
  padding:16px 14px 50px;overflow-x:hidden;
}
.page{position:relative;z-index:1;width:100%;max-width:440px}

/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--muted);text-decoration:none;
  font-size:.82em;padding:6px 13px;border-radius:20px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:.2s}
.back:hover{color:var(--text);background:rgba(255,255,255,.09)}
.pg-t{font-size:.88em;font-weight:700;color:#a7c9b0}

/* Header */
.hdr{text-align:center;margin-bottom:10px}
.hdr h2{font-size:1.25em;font-weight:700;
  background:linear-gradient(135deg,#6ee7b7,#fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{font-size:.72em;color:var(--muted);margin-top:2px}

/* IN/OUT */
.toggle{display:flex;gap:6px;margin-bottom:10px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:13px;padding:5px}
.tog{flex:1;padding:9px;border:none;border-radius:9px;font-family:'Kanit',sans-serif;
  font-size:.88em;font-weight:700;cursor:pointer;transition:.25s;
  color:var(--muted);background:transparent}
.tog.in {background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;box-shadow:0 3px 12px rgba(16,185,129,.4)}
.tog.out{background:linear-gradient(135deg,var(--r),#dc2626);color:#fff;box-shadow:0 3px 12px rgba(239,68,68,.4)}

/* Status strip */
.strip{
  background:var(--glass);border:1px solid var(--border);border-radius:12px;
  padding:10px 14px;margin-bottom:10px;
  display:grid;grid-template-columns:auto 1fr;align-items:center;gap:10px;
}
.strip-icon{font-size:20px}
.strip-right{}
.strip-title{font-size:.8em;font-weight:700;color:#c8d8f0;margin-bottom:3px}
.prog-track{background:rgba(255,255,255,.08);border-radius:20px;height:5px;overflow:hidden}
.prog-bar{height:100%;border-radius:20px;width:0%;transition:width .35s ease;
  background:linear-gradient(90deg,var(--g),#059669)}
.prog-label{font-size:.68em;color:var(--muted);margin-top:4px}

/* Camera — เปิดทันที ไม่รอ model */
.cam-wrap{
  position:relative;border-radius:18px;overflow:hidden;
  border:2px solid rgba(16,185,129,.3);
  box-shadow:0 0 35px rgba(16,185,129,.1);
  background:#010805;
  /* กำหนดสัดส่วนไว้ล่วงหน้า ไม่กระตุก */
  aspect-ratio:4/3;
}
video{
  width:100%;height:100%;display:block;
  transform:scaleX(-1);object-fit:cover;border-radius:16px;
}

/* Face ring */
.ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);
  width:160px;height:200px;border-radius:55% 55% 50% 50%;
  border:2.5px dashed rgba(16,185,129,.4);pointer-events:none;transition:.3s;
}
.ring.found{border-style:solid;border-color:rgba(16,185,129,.95);
  box-shadow:0 0 20px rgba(16,185,129,.45);animation:none}
.ring.seek{border-color:rgba(245,166,35,.7);border-style:solid;
  animation:rpulse .9s ease infinite}

/* Confidence overlay */
.conf-badge{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(4,9,26,.85);border:1px solid rgba(255,255,255,.12);
  border-radius:30px;padding:5px 16px;font-size:.78em;font-weight:700;
  backdrop-filter:blur(8px);white-space:nowrap;transition:.3s;
  color:#6ee7b7;pointer-events:none;
}

/* Model loading overlay (shows OVER camera while loading) */
.model-overlay{
  position:absolute;inset:0;border-radius:16px;
  background:rgba(4,9,26,.88);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  transition:opacity .4s ease;
}
.model-overlay.hidden{opacity:0;pointer-events:none}
.model-spinner{
  width:48px;height:48px;border-radius:50%;
  border:4px solid rgba(16,185,129,.2);border-top-color:var(--g);
  animation:spin .8s linear infinite;
}
.model-pct{font-size:1.6em;font-weight:700;color:#6ee7b7}
.model-label{font-size:.76em;color:var(--muted);text-align:center;padding:0 20px}

/* Start overlay */
.start-overlay{
  position:absolute;inset:0;border-radius:16px;
  background:rgba(4,9,26,.82);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  transition:opacity .4s ease;
}
.start-overlay.hidden{opacity:0;pointer-events:none}
.start-btn{
  width:70px;height:70px;border-radius:50%;
  background:linear-gradient(135deg,var(--g),var(--g2));
  border:none;cursor:pointer;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px rgba(16,185,129,.5);
  animation:pulse 2s ease infinite;transition:.25s;
}
.start-btn:hover{transform:scale(1.1);animation:none}
.start-btn:disabled{background:rgba(255,255,255,.1);animation:none;cursor:not-allowed}
.start-tip{font-size:.78em;color:#6ee7b7;font-weight:600;text-align:center}

/* GPS row */
.gps-row{
  display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;
}
.gps-chip{
  display:flex;align-items:center;gap:4px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:.72em;
  flex:1;min-width:120px;
}
.gps-chip label{color:var(--muted);margin-right:2px}
.gps-chip span{font-weight:700}
.gok{color:#34d399!important}.gerr{color:#f87171!important}

/* Match card */
.match-card{
  display:none;background:var(--glass);border:1px solid rgba(16,185,129,.4);
  border-radius:18px;padding:16px;margin-top:12px;
  backdrop-filter:blur(16px);text-align:center;
  animation:fadeup .35s ease;
}
.match-photo{
  width:80px;height:80px;border-radius:14px;object-fit:cover;
  border:2px solid rgba(16,185,129,.45);margin:0 auto 10px;display:block;
}
.match-name{font-size:1.2em;font-weight:700;color:#6ee7b7}
.match-meta{font-size:.73em;color:var(--muted);margin-top:2px}

.btn-confirm{
  width:100%;padding:13px;margin-top:12px;border:none;border-radius:50px;
  font-size:15px;font-weight:700;font-family:'Kanit',sans-serif;cursor:pointer;transition:.3s;color:#fff;
}
.c-in {background:linear-gradient(135deg,var(--g),var(--g2));box-shadow:0 4px 18px rgba(16,185,129,.4)}
.c-in:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(16,185,129,.6)}
.c-out{background:linear-gradient(135deg,var(--r),#dc2626);box-shadow:0 4px 18px rgba(239,68,68,.35)}
.c-out:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(239,68,68,.55)}
.c-in:disabled,.c-out:disabled{background:rgba(255,255,255,.1);box-shadow:none;cursor:not-allowed;transform:none}

.btn-cancel{
  width:100%;padding:8px;margin-top:6px;background:transparent;
  color:var(--muted);border:1px solid rgba(255,255,255,.1);
  border-radius:50px;font-family:'Kanit',sans-serif;cursor:pointer;transition:.2s;font-size:.88em;
}
.btn-cancel:hover{color:var(--text)}

.save-status{font-size:.74em;color:var(--muted);margin-top:6px;min-height:18px;text-align:center}

/* Clock */
.clock-row{text-align:center;margin-bottom:8px}
.clock-time{font-size:1.7em;font-weight:700;color:#fff;letter-spacing:.03em}
.clock-date{font-size:.72em;color:var(--muted);margin-top:1px}

@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes pulse  {0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 12px rgba(16,185,129,0)}}
@keyframes rpulse {0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeup {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeup .4s ease}
</style>
</head>
<body>
<div class="page">

  <div class="nav">
    <a href="index.html" class="back">← หน้าหลัก</a>
    <span class="pg-t">📷 สแกนลงเวลา</span>
  </div>

  <!-- นาฬิกา -->
  <div class="clock-row">
    <div class="clock-time" id="clkT">--:--:--</div>
    <div class="clock-date" id="clkD">—</div>
  </div>

  <!-- IN/OUT -->
  <div class="toggle">
    <button class="tog in"  id="btnIn"  onclick="setType('IN')">✅ เข้างาน</button>
    <button class="tog"     id="btnOut" onclick="setType('OUT')">🚪 ออกงาน</button>
  </div>

  <!-- Progress strip — แสดงระหว่างโหลด Model -->
  <div class="strip" id="strip">
    <div class="strip-icon" id="stripIcon">⏳</div>
    <div class="strip-right">
      <div class="strip-title" id="stripTitle">กำลังเตรียมระบบ</div>
      <div class="prog-track"><div class="prog-bar" id="progBar"></div></div>
      <div class="prog-label" id="progLabel">เริ่มต้น...</div>
    </div>
  </div>

  <!-- Camera (เปิดทันที — Model overlay ทับอยู่ด้านบน) -->
  <div class="cam-wrap">
    <video id="video" autoplay muted playsinline></video>
    <div class="ring" id="ring"></div>
    <div class="conf-badge" id="confBadge" style="display:none"></div>

    <!-- Model loading overlay -->
    <div class="model-overlay" id="modelOverlay">
      <div class="model-spinner"></div>
      <div class="model-pct" id="modelPct">0%</div>
      <div class="model-label" id="modelLabel">กำลังโหลด AI Model...</div>
    </div>

    <!-- Start button overlay (แสดงหลัง model โหลดเสร็จ) -->
    <div class="start-overlay hidden" id="startOverlay">
      <button class="start-btn" id="startBtn" onclick="startScan()" disabled>▶</button>
      <div class="start-tip" id="startTip">กำลังเตรียม...</div>
    </div>
  </div>

  <!-- GPS chips -->
  <div class="gps-row" id="gpsRow" style="display:none">
    <div class="gps-chip"><label>📍</label><span id="gpsCoord">—</span></div>
    <div class="gps-chip"><label>ระยะ:</label><span id="gpsDist">—</span></div>
    <div class="gps-chip"><label>สถานะ:</label><span id="gpsStatus">—</span></div>
  </div>

  <!-- Match card -->
  <div class="match-card" id="matchCard">
    <div id="matchEmoji" style="font-size:40px;margin-bottom:6px">😊</div>
    <img  id="matchPhoto" class="match-photo" src="" style="display:none">
    <div id="matchName" class="match-name">—</div>
    <div id="matchMeta" class="match-meta">—</div>
    <button class="btn-confirm c-in" id="btnConfirm" onclick="confirmAttendance()">✅ ยืนยันเข้างาน</button>
    <div class="save-status" id="saveStatus"></div>
    <button class="btn-cancel" onclick="cancelMatch()">✕ ยกเลิก / สแกนใหม่</button>
  </div>

</div>

<script>
'use strict';

// ──────────────────────────────────────────────────────────
//  CONFIG
// ──────────────────────────────────────────────────────────
const API_URL   = localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '');
const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';

// ★ เปลี่ยนจาก SsdMobilenetv1 (5.4MB ช้า) → TinyFaceDetector (190KB เร็วกว่า 10x)
// ★ เปลี่ยนจาก FaceLandmark68Net (350KB) → FaceLandmark68TinyNet (80KB)
// รวมโหลดน้อยลง ~5MB+ และ detect เร็วขึ้น 5-10x
const TINY_OPTS = new faceapi.TinyFaceDetectorOptions({
  inputSize:  224,   // 128|160|224|320|416|608 — เล็กลง=เร็วขึ้น (224 สมดุล)
  scoreThreshold: 0.5
});

// ★ Threshold สำหรับยืนยันตัวตน (ต่ำ=เข้มงวด, สูง=หลวม)
const MATCH_THOLD = 0.45;

// ★ สแกนทุกกี่ ms (น้อยกว่า=เร็วขึ้น, แต่กิน CPU มากกว่า)
const SCAN_MS = 400;

// State
let scanType    = 'IN';
let knownUsers  = [];          // [{name, email, descriptors:[Float32Array,...]}]
let gpsConfig   = {lat:0, lng:0, radius:0};
let myGPS       = {lat:null, lng:null, dist:null, ok:true, fakeFlag:false};
let loopId      = null;
let matchedUser = null;
let capturedImg = null;
let isScanning  = false;
let readyToScan = false;

// DOM
const video        = document.getElementById('video');
const ring         = document.getElementById('ring');
const confBadge    = document.getElementById('confBadge');
const matchCard    = document.getElementById('matchCard');
const modelOverlay = document.getElementById('modelOverlay');
const startOverlay = document.getElementById('startOverlay');
const startBtn     = document.getElementById('startBtn');
const startTip     = document.getElementById('startTip');
const progBar      = document.getElementById('progBar');
const progLabel    = document.getElementById('progLabel');
const modelPct     = document.getElementById('modelPct');
const modelLabel   = document.getElementById('modelLabel');
const strip        = document.getElementById('strip');

// ── Clock ──────────────────────────────────────────────────
(function tick(){
  const n=new Date();
  document.getElementById('clkT').textContent = n.toLocaleTimeString('th-TH',{hour12:false});
  document.getElementById('clkD').textContent = n.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  setTimeout(tick, 1000);
})();

// ── Type toggle ────────────────────────────────────────────
function setType(t){
  scanType=t;
  document.getElementById('btnIn').className  = 'tog' + (t==='IN'  ? ' in'  : '');
  document.getElementById('btnOut').className = 'tog' + (t==='OUT' ? ' out' : '');
  const bc = document.getElementById('btnConfirm');
  bc.textContent = t==='IN' ? '✅ ยืนยันเข้างาน' : '🚪 ยืนยันออกงาน';
  bc.className   = 'btn-confirm ' + (t==='IN' ? 'c-in' : 'c-out');
  document.getElementById('matchEmoji').textContent = t==='IN' ? '😊' : '👋';
}

// ── Progress helpers ───────────────────────────────────────
function setProg(pct, label) {
  progBar.style.width = pct + '%';
  progLabel.textContent = label;
  modelPct.textContent  = pct + '%';
  modelLabel.textContent = label;
}

// ── Haversine ──────────────────────────────────────────────
function hav(a,b,c,d){
  const R=6371, dA=(c-a)*Math.PI/180, dB=(d-b)*Math.PI/180;
  const e=Math.sin(dA/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dB/2)**2;
  return R*2*Math.atan2(Math.sqrt(e),Math.sqrt(1-e));
}

// ── Fake GPS ───────────────────────────────────────────────
function checkFakeGPS(la,lo){
  const prev=JSON.parse(localStorage.getItem('_lgps')||'null');
  const now=Date.now();
  localStorage.setItem('_lgps',JSON.stringify({la,lo,t:now}));
  if(!prev||!prev.t)return false;
  const secs=(now-prev.t)/1000;
  if(secs<2)return false;
  return (hav(prev.la,prev.lo,la,lo)/secs)*3600 > 500; // > 500 km/h
}

// ── Compress + watermark ───────────────────────────────────
function compressPhoto(maxW=540, q=0.60){
  try{
    const vw=video.videoWidth||480, vh=video.videoHeight||360;
    const r=Math.min(maxW/vw, maxW/vh, 1);
    const c=document.createElement('canvas');
    c.width=Math.round(vw*r); c.height=Math.round(vh*r);
    const ctx=c.getContext('2d');
    ctx.save(); ctx.scale(-1,1); ctx.translate(-c.width,0);
    ctx.drawImage(video,0,0,c.width,c.height);
    ctx.restore();
    // Watermark bar
    const ts=new Date().toLocaleString('th-TH',{dateStyle:'short',timeStyle:'medium'});
    ctx.fillStyle='rgba(0,0,0,.6)';
    ctx.fillRect(0,c.height-30,c.width,30);
    ctx.fillStyle='#fff'; ctx.font='bold 10px Kanit,sans-serif';
    ctx.fillText('SPK · '+scanType+' · '+ts, 4, c.height-17);
    ctx.fillStyle='#aad4ff'; ctx.font='9px Kanit,sans-serif';
    ctx.fillText(myGPS.lat?`${myGPS.lat.toFixed(5)}, ${myGPS.lng.toFixed(5)}`:'', 4, c.height-5);
    return c.toDataURL('image/jpeg',q);
  }catch(_){ return null; }
}

// ════════════════════════════════════════════════════════
//  INIT — ทำทุกอย่าง PARALLEL
// ════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  if(!API_URL){
    showStrip('error','❌ ยังไม่ตั้งค่า API','<a href="admin.html" style="color:#fbbf24">ไปตั้งค่า</a>');
    return;
  }

  // 1. เปิดกล้องทันที (ไม่รออะไร)
  openCamera();

  // 2. ทำ 3 อย่างพร้อมกัน
  await Promise.all([
    doGPS(),
    loadModels(),
    loadFaces()
  ]);

  // 3. พร้อมสแกน
  if(readyToScan) showReadyState();
});

// ── เปิดกล้องทันที (ไม่รอ model) ────────────────────────
async function openCamera(){
  try{
    const s = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user', width:{ideal:640}, height:{ideal:480}}
    });
    video.srcObject = s;
  }catch(e){
    modelLabel.textContent = '❌ เปิดกล้องไม่ได้: '+e.message;
  }
}

// ── GPS ───────────────────────────────────────────────────
async function doGPS(){
  // โหลด config GPS
  try{
    const cfg = await (await fetch(API_URL+'?action=getConfig')).json();
    gpsConfig = {
      lat:    parseFloat(cfg.lat)    || 0,
      lng:    parseFloat(cfg.lng)    || 0,
      radius: parseFloat(cfg.radius) || 0
    };
  }catch(_){}

  if(!navigator.geolocation){ myGPS.ok=true; return; }
  return new Promise(resolve=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      const la=pos.coords.latitude, lo=pos.coords.longitude;
      myGPS.lat=la; myGPS.lng=lo;
      myGPS.fakeFlag=checkFakeGPS(la,lo);
      const dist=(gpsConfig.lat&&gpsConfig.lng)?hav(la,lo,gpsConfig.lat,gpsConfig.lng):0;
      myGPS.dist=dist;
      myGPS.ok=!gpsConfig.radius||gpsConfig.radius===0||dist<=gpsConfig.radius;
      // แสดง GPS chips
      const row=document.getElementById('gpsRow');
      row.style.display='flex';
      document.getElementById('gpsCoord').textContent=`${la.toFixed(5)}, ${lo.toFixed(5)}`;
      document.getElementById('gpsDist').textContent=gpsConfig.radius>0?`${(dist*1000).toFixed(0)} ม.`:'ไม่จำกัด';
      const st=document.getElementById('gpsStatus');
      st.textContent = myGPS.ok ? '✅ ในพื้นที่' : '❌ นอกพื้นที่';
      st.className   = myGPS.ok ? 'gok' : 'gerr';
      if(myGPS.fakeFlag) st.textContent += ' ⚠️';
      resolve();
    }, ()=>{ myGPS.ok=true; resolve(); }, {enableHighAccuracy:true,timeout:10000});
  });
}

// ── โหลด AI Models ★ TinyFaceDetector แทน SsdMobilenetv1 ─
let modelsLoaded = false;
async function loadModels(){
  try{
    setProg(5, 'โหลด TinyFaceDetector...');
    // ★ Tiny models: รวมกัน ~280KB แทนที่ ~5.8MB ของ SSD
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    setProg(35, 'โหลด FaceLandmark Tiny...');

    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
    setProg(65, 'โหลด FaceRecognition...');

    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
    setProg(90, 'Model พร้อมแล้ว ✅');

    modelsLoaded = true;
  }catch(e){
    modelLabel.textContent = '❌ โหลด Model ล้มเหลว: '+e.message;
    throw e;
  }
}

// ── โหลดข้อมูลบุคลากร + Pre-compute Float32Array ──────────
let facesLoaded = false;
async function loadFaces(){
  try{
    const data = await (await fetch(API_URL+'?action=getKnownFaces')).json();
    if(data.status==='error') throw new Error(data.message);

    // ★ Pre-convert เป็น Float32Array ล่วงหน้า (ไม่ต้อง convert ทุก frame)
    knownUsers = (data.users||[]).map(u=>({
      name:        u.name,
      email:       u.email,
      // แต่ละคนอาจมีหลาย descriptor (หลายมุม) → array of Float32Array
      descriptors: (u.descriptors||[]).map(d => new Float32Array(d))
    }));

    facesLoaded = true;
    if(modelsLoaded) readyToScan = true;
  }catch(e){
    modelLabel.textContent = '❌ โหลดข้อมูลล้มเหลว: '+e.message;
    throw e;
  }
}

function showReadyState(){
  readyToScan = true;
  setProg(100,'✅ พร้อมสแกน — กดปุ่มเพื่อเริ่ม');
  strip.innerHTML = `
    <div class="strip-icon">✅</div>
    <div class="strip-right">
      <div class="strip-title">ระบบพร้อม</div>
      <div class="prog-label">บุคลากร ${knownUsers.length} คน | กดปุ่มบนกล้องเพื่อสแกน</div>
    </div>`;
  modelOverlay.classList.add('hidden');
  startOverlay.classList.remove('hidden');

  if(!myGPS.ok && gpsConfig.radius>0){
    // ★ แสดง block ชัดเจน — GPS นอกพื้นที่
    const distM = myGPS.dist ? `${(myGPS.dist*1000).toFixed(0)} ม.` : '?';
    startBtn.disabled = false; // กดได้แต่จะ block ตอน startScan
    startTip.innerHTML = `❌ GPS นอกพื้นที่ (${distM})<br><small style="color:#94a3b8">กดปุ่มเพื่อดูรายละเอียด</small>`;
    // อัปเดต GPS chip ให้แดง
    const stEl = document.getElementById('gpsStatus');
    if(stEl){ stEl.textContent='❌ นอกพื้นที่'; stEl.className='gerr'; }
  }else{
    startBtn.disabled = false;
    startTip.textContent = 'แตะเพื่อเริ่มสแกน';
  }
}

function showStrip(type, title, label){
  document.getElementById('stripIcon').textContent  = type==='error'?'❌':'ℹ️';
  document.getElementById('stripTitle').textContent = title;
  document.getElementById('progLabel').innerHTML    = label;
}

// ════════════════════════════════════════════════════════
//  SCAN
// ════════════════════════════════════════════════════════
function startScan(){
  if(!readyToScan){ alert('ระบบยังไม่พร้อม'); return; }

  // ★ GPS block ที่ชัดเจน — แสดงระยะจริง
  if(!myGPS.ok && gpsConfig.radius>0){
    const distM = myGPS.dist ? `${(myGPS.dist*1000).toFixed(0)} ม.` : '?';
    Swal.fire({
      icon:'error',
      title:'❌ GPS นอกพื้นที่',
      html:`ระยะปัจจุบัน: <b style="color:#f87171">${distM}</b><br>
            รัศมีที่อนุญาต: <b style="color:#34d399">${(gpsConfig.radius*1000).toFixed(0)} ม.</b><br>
            <small style="color:#94a3b8">กรุณาเดินเข้ามาในพื้นที่โรงเรียนก่อน</small>`,
      background:'#1e0a0a',color:'#e8edf5',confirmButtonColor:'#ef4444'
    });
    return;
  }

  // ซ่อน start overlay
  startOverlay.classList.add('hidden');
  isScanning  = true;
  matchedUser = null;
  capturedImg = null;
  confBadge.style.display='block';
  confBadge.textContent='🔍 มองตรงกล้อง...';
  ring.className='ring seek';
  startLoop();
}

// ── Detection loop ★ ใช้ TinyFaceDetector ─────────────────
function startLoop(){
  if(loopId) clearInterval(loopId);
  loopId = setInterval(async ()=>{
    if(!isScanning||matchedUser||!video.readyState||video.readyState<2)return;
    try{
      // ★ TinyFaceDetector เร็วกว่า SSD ~5-10x
      // ★ ใช้ faceLandmark68TinyNet แทน faceLandmark68Net (เล็กกว่า)
      const det = await faceapi
        .detectSingleFace(video, TINY_OPTS)
        .withFaceLandmarks(true)       // true = ใช้ TinyLandmark (เร็วกว่า)
        .withFaceDescriptor();

      if(!det){
        ring.className  = 'ring';
        confBadge.textContent = '🔍 มองตรงกล้อง...';
        return;
      }

      ring.className = 'ring found';

      // ★ เปรียบเทียบกับ Float32Array ที่ pre-compute แล้ว (ไม่ต้อง new Float32Array ทุก frame)
      let best=null, bestD=999;
      for(const u of knownUsers){
        for(const fd of u.descriptors){
          const d = faceapi.euclideanDistance(det.descriptor, fd);
          if(d<bestD){ bestD=d; best=u; }
        }
      }

      const conf   = Math.max(0, (1-bestD)*100);
      const needed = Math.round((1-MATCH_THOLD)*100);

      if(best && bestD < MATCH_THOLD){
        // ✅ Match! — หยุด loop + ปิดกล้องทันที
        clearInterval(loopId);
        isScanning  = false;
        matchedUser = best;
        capturedImg = compressPhoto();
        confBadge.textContent = `✅ พบ: ${best.name} (${conf.toFixed(0)}%)`;
        ring.className = 'ring found';
        // ★ ปิดกล้องทันทีหลังสแกนได้ — ประหยัดแบต + ไม่ค้าง
        stopCamera();
        setTimeout(()=>showMatch(best,bestD), 100);
      }else{
        // ยังไม่ตรง
        ring.className = 'ring seek';
        confBadge.textContent = best
          ? `🔍 ${conf.toFixed(0)}% / ต้องการ${needed}% (${best.name})`
          : `🔍 ${conf.toFixed(0)}% / ต้องการ${needed}%`;
      }
    }catch(e){
      // loop ต่อ ไม่หยุด
      console.warn('detect:', e.message);
    }
  }, SCAN_MS);
}

function showMatch(user, dist){
  matchCard.style.display='block';
  document.getElementById('matchName').textContent = user.name;
  document.getElementById('matchMeta').textContent =
    `ความเหมือน ${((1-dist)*100).toFixed(1)}%` +
    (myGPS.dist!=null ? ` | ${(myGPS.dist*1000).toFixed(0)} ม. จากจุดเช็คอิน` : '');
  const img=document.getElementById('matchPhoto');
  if(capturedImg){ img.src=capturedImg; img.style.display='block'; }
  matchCard.scrollIntoView({behavior:'smooth',block:'center'});
  // อัปเดต button ตาม type ปัจจุบัน
  setType(scanType);
}

function cancelMatch(){
  if(loopId) clearInterval(loopId);
  isScanning=false; matchedUser=null; capturedImg=null;
  matchCard.style.display='none';
  ring.className='ring';
  confBadge.style.display='none';
  // ★ เปิดกล้องใหม่เมื่อสแกนต่อ (เพราะปิดไปแล้วตอนสแกนสำเร็จ)
  openCamera();
  // แสดง start overlay อีกครั้ง
  startOverlay.classList.remove('hidden');
  startBtn.disabled=false;
  startTip.textContent='แตะเพื่อสแกนใหม่';
}

// ★ ปิดกล้อง (หลัง match แล้ว)
function stopCamera(){
  try{
    if(video.srcObject){
      video.srcObject.getTracks().forEach(t=>t.stop());
      video.srcObject=null;
    }
  }catch(_){}
}

// ════════════════════════════════════════════════════════
//  CONFIRM & SAVE
// ════════════════════════════════════════════════════════
async function confirmAttendance(){
  const btn = document.getElementById('btnConfirm');
  const st  = document.getElementById('saveStatus');
  btn.disabled=true;
  btn.textContent='⏳ กำลังบันทึก...';
  st.textContent='';

  // ── 1. Upload photo (ไม่ block ถ้าล้มเหลว) ──────────────
  let photoUrl='';
  if(capturedImg && API_URL){
    st.textContent='⬆️ กำลังอัปโหลดภาพ...';
    try{
      const fn = `${matchedUser.name.replace(/ /g,'_')}_${scanType}_${Date.now()}.jpg`;
      const pr = await fetch(API_URL,{
        method:'POST',
        body:JSON.stringify({action:'savePhoto',imageBase64:capturedImg,filename:fn})
      });
      const pd = await pr.json();
      if(pd.status==='ok'){
        photoUrl = pd.url;
        st.textContent=`✅ อัปโหลดภาพสำเร็จ (~${pd.sizeKB||'?'}KB)`;
      }else{
        st.textContent='⚠️ อัปโหลดภาพล้มเหลว — บันทึกเวลาต่อ';
      }
    }catch(e){
      st.textContent='⚠️ อัปโหลดภาพล้มเหลว — บันทึกเวลาต่อ';
    }
  }

  // ── 2. บันทึกเวลา (request แยก → ไม่ขึ้นกับภาพ) ─────────
  try{
    const res = await fetch(API_URL,{
      method:'POST',
      body:JSON.stringify({
        action:      'logAttendance',
        name:        matchedUser.name,
        email:       matchedUser.email||'',
        type:        scanType,
        lat:         myGPS.lat,
        lng:         myGPS.lng,
        distance:    myGPS.dist||0,
        fakeGPSFlag: myGPS.fakeFlag||false,
        photoUrl:    photoUrl,
        note:        ''
      })
    });

    // ★ ตรวจ response ก่อน parse — ป้องกัน GAS return HTML error
    const rawText = await res.text();
    let data;
    try{ data = JSON.parse(rawText); }
    catch(pe){
      throw new Error('GAS ตอบกลับไม่ใช่ JSON: '+rawText.slice(0,200));
    }

    if(data.status==='error') throw new Error(data.message);

    const isLate  = data.note && data.note.includes('สาย');
    const typeTH  = scanType==='IN'?'เข้างาน':'ออกงาน';

    Swal.fire({
      icon: 'success',
      title:`${typeTH}สำเร็จ! ${scanType==='IN'&&isLate?'⚠️ สาย':''}`,
      html: `<b>${matchedUser.name}</b><br>เวลา <b>${data.time}</b> น. · ${data.date}`
           +(myGPS.fakeFlag?'<br><span style="color:#fcd34d;font-size:.9em">⚠️ GPS ผิดปกติ</span>':''),
      background:         scanType==='IN'?'#0d2a1d':'#1e0a0a',
      color:              '#e8edf5',
      confirmButtonColor: scanType==='IN'?'#10b981':'#ef4444',
      confirmButtonText:  'กลับหน้าหลัก',
      showCancelButton:   true,
      cancelButtonText:   '🔄 สแกนต่อ',
      cancelButtonColor:  '#334155',
    }).then(r=>{
      if(r.isConfirmed) location.href='index.html';
      else cancelMatch();
    });

  }catch(e){
    Swal.fire({
      icon:'error',
      title:'❌ บันทึกล้มเหลว',
      html:`<b>${e.message}</b><br><small style="color:#94a3b8">ตรวจสอบ GAS URL, Sheet ID และ Deploy</small>`,
      background:'#1e0a0a',color:'#e8edf5',confirmButtonColor:'#ef4444'
    });
    btn.disabled=false;
    btn.textContent = scanType==='IN'?'✅ ยืนยันเข้างาน':'🚪 ยืนยันออกงาน';
  }
}
</script>
